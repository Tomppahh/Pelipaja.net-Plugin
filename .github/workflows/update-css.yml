name: Auto-Update CounterStrikeSharp

on:
  schedule:
    - cron: '0 */3 * * *'
  workflow_dispatch:

jobs:
  check-and-update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Get current version
        id: current
        run: |
          CURRENT=$(dotnet list package --format json | jq -r '.projects[0].frameworks.[0].topLevelPackages[] | select(.id == "CounterStrikeSharp.API") | .requestedVersion')
          echo "version=$CURRENT" >> "$GITHUB_OUTPUT"
          echo "Current version: $CURRENT"

      - name: Get latest version from NuGet
        id: latest
        run: |
          LATEST=$(curl -s "https://api.nuget.org/v3-flatcontainer/counterstrikesharp.api/index.json" | jq -r '.[-1]')
          echo "version=$LATEST" >> "$GITHUB_OUTPUT"
          echo "Latest version: $LATEST"

      - name: Compare versions
        id: compare
        run: |
          if [ "${{ steps.current.outputs.version }}" = "${{ steps.latest.outputs.version }}" ]; then
            echo "up_to_date=true" >> "$GITHUB_OUTPUT"
            echo "Already up to date."
          else
            echo "up_to_date=false" >> "$GITHUB_OUTPUT"
            echo "Update available: ${{ steps.current.outputs.version }} -> ${{ steps.latest.outputs.version }}"
          fi

      - name: Update package
        if: steps.compare.outputs.up_to_date == 'false'
        run: dotnet add package CounterStrikeSharp.API --version "${{ steps.latest.outputs.version }}"

      - name: Verify build
        if: steps.compare.outputs.up_to_date == 'false'
        run: dotnet build -c Release

      - name: Log in to GHCR
        if: steps.compare.outputs.up_to_date == 'false'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        if: steps.compare.outputs.up_to_date == 'false'
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        if: steps.compare.outputs.up_to_date == 'false'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          build-args: |
            CSSAPI_VERSION=${{ steps.latest.outputs.version }}
          tags: |
            ghcr.io/tomppahh/pelipaja-cs2:latest
            ghcr.io/tomppahh/pelipaja-cs2:v${{ steps.latest.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Commit version bump
        if: steps.compare.outputs.up_to_date == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add MatchUp.csproj
          git commit -m "chore: update CounterStrikeSharp.API to ${{ steps.latest.outputs.version }}"
          git push
