name: Auto-Update CSS & Metamod

on:
  workflow_dispatch:

jobs:
  check-and-update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      # ── CounterStrikeSharp ───────────────────────────────────────────────

      - name: Get current CSS version
        id: current_css
        run: |
          CURRENT=$(dotnet list MatchUp.csproj package --format json | jq -r '.projects[0].frameworks.[0].topLevelPackages[] | select(.id == "CounterStrikeSharp.API") | .requestedVersion')
          if [ -z "$CURRENT" ] || [ "$CURRENT" = "null" ]; then
            echo "::error::Failed to read current CSS version from csproj"
            exit 1
          fi
          echo "version=$CURRENT" >> "$GITHUB_OUTPUT"
          echo "Current CSS version: $CURRENT"

      - name: Get target framework
        id: tfm
        run: |
          TFM=$(grep -oP 'TargetFramework>\K[^<]+' MatchUp.csproj)
          echo "tfm=$TFM" >> "$GITHUB_OUTPUT"
          echo "Target framework: $TFM"

      - name: Get latest compatible CSS version
        id: latest_css
        run: |
          TFM="${{ steps.tfm.outputs.tfm }}"
          VERSIONS=$(curl -sf "https://api.nuget.org/v3-flatcontainer/counterstrikesharp.api/index.json" | jq -r '[.versions[] | select(test("alpha|beta|rc") | not)] | reverse | .[]')

          if [ -z "$VERSIONS" ]; then
            echo "::error::Failed to fetch CSS version list from NuGet"
            exit 1
          fi

          LATEST=""
          for V in $VERSIONS; do
            NUSPEC=$(curl -sf "https://api.nuget.org/v3-flatcontainer/counterstrikesharp.api/$V/counterstrikesharp.api.nuspec")
            if echo "$NUSPEC" | grep -q "targetFramework=\"$TFM\""; then
              LATEST="$V"
              break
            fi
          done

          if [ -z "$LATEST" ]; then
            echo "::error::No compatible CSS version found for $TFM"
            exit 1
          fi

          echo "version=$LATEST" >> "$GITHUB_OUTPUT"
          echo "Latest compatible CSS version: $LATEST"

      - name: Compare CSS versions
        id: compare_css
        run: |
          if [ "${{ steps.current_css.outputs.version }}" = "${{ steps.latest_css.outputs.version }}" ]; then
            echo "up_to_date=true" >> "$GITHUB_OUTPUT"
            echo "CSS already up to date."
          else
            echo "up_to_date=false" >> "$GITHUB_OUTPUT"
            echo "CSS update available: ${{ steps.current_css.outputs.version }} -> ${{ steps.latest_css.outputs.version }}"
          fi

      - name: Update CSS package
        if: steps.compare_css.outputs.up_to_date == 'false'
        run: dotnet add package CounterStrikeSharp.API --version "${{ steps.latest_css.outputs.version }}"

      # ── Metamod ─────────────────────────────────────────────────────────

      - name: Get current Metamod version
        id: current_mm
        run: |
          CURRENT=$(grep -oP 'METAMOD_VERSION=\K[0-9]+' Dockerfile)
          if [ -z "$CURRENT" ]; then
            echo "::error::Failed to read Metamod version from Dockerfile"
            exit 1
          fi
          echo "version=$CURRENT" >> "$GITHUB_OUTPUT"
          echo "Current Metamod version: $CURRENT"

      - name: Get latest Metamod version
        id: latest_mm
        run: |
          LATEST=$(curl -sf -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" "https://api.github.com/repos/alliedmodders/metamod-source/releases" | jq -r '[.[] | select(.tag_name | startswith("2.0.0."))][0].tag_name' | sed 's/2.0.0.//')
          if [ -z "$LATEST" ] || [ "$LATEST" = "null" ]; then
            echo "::error::Failed to fetch latest Metamod version from GitHub"
            exit 1
          fi
          echo "version=$LATEST" >> "$GITHUB_OUTPUT"
          echo "Latest Metamod version: $LATEST"

      - name: Compare Metamod versions
        id: compare_mm
        run: |
          if [ "${{ steps.current_mm.outputs.version }}" = "${{ steps.latest_mm.outputs.version }}" ]; then
            echo "up_to_date=true" >> "$GITHUB_OUTPUT"
            echo "Metamod already up to date."
          else
            echo "up_to_date=false" >> "$GITHUB_OUTPUT"
            echo "Metamod update available: ${{ steps.current_mm.outputs.version }} -> ${{ steps.latest_mm.outputs.version }}"
          fi

      - name: Update Metamod version
        if: steps.compare_mm.outputs.up_to_date == 'false'
        run: |
          sed -i "s/ARG METAMOD_VERSION=${{ steps.current_mm.outputs.version }}/ARG METAMOD_VERSION=${{ steps.latest_mm.outputs.version }}/" Dockerfile

      # ── Build & push ────────────────────────────────────────────────────

      - name: Should rebuild
        id: should_rebuild
        run: |
          if [ "${{ steps.compare_css.outputs.up_to_date }}" = "false" ] || [ "${{ steps.compare_mm.outputs.up_to_date }}" = "false" ]; then
            echo "rebuild=true" >> "$GITHUB_OUTPUT"
            echo "Rebuild needed."
          else
            echo "rebuild=false" >> "$GITHUB_OUTPUT"
            echo "Everything up to date, skipping build."
          fi

      - name: Verify build
        if: steps.should_rebuild.outputs.rebuild == 'true'
        run: dotnet build MatchUp.csproj -c Release

      - name: Log in to GHCR
        if: steps.should_rebuild.outputs.rebuild == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: tomppahh
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Set up Docker Buildx
        if: steps.should_rebuild.outputs.rebuild == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        if: steps.should_rebuild.outputs.rebuild == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          build-args: |
            CSSAPI_VERSION=${{ steps.latest_css.outputs.version }}
            METAMOD_VERSION=${{ steps.latest_mm.outputs.version }}
          tags: |
            ghcr.io/tomppahh/pelipaja-cs2:latest
            ghcr.io/tomppahh/pelipaja-cs2:v${{ steps.latest_css.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── Commit ──────────────────────────────────────────────────────────

      - name: Commit updates
        if: steps.should_rebuild.outputs.rebuild == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add MatchUp.csproj Dockerfile
          MSG="chore: "
          if [ "${{ steps.compare_css.outputs.up_to_date }}" = "false" ]; then
            MSG="${MSG}update CSS to ${{ steps.latest_css.outputs.version }}"
          fi
          if [ "${{ steps.compare_mm.outputs.up_to_date }}" = "false" ]; then
            MSG="${MSG}update Metamod to ${{ steps.latest_mm.outputs.version }}"
          fi
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "$MSG"
          git push
