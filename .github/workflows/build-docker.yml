name: Build Docker Image

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Get versions from csproj
        id: versions
        run: |
          TFM=$(grep -oP 'TargetFramework>\K[^<]+' MatchUp.csproj)
          CSS=$(dotnet list MatchUp.csproj package --format json | jq -r '.projects[0].frameworks.[0].topLevelPackages[] | select(.id == "CounterStrikeSharp.API") | .requestedVersion')
          MM=$(grep -oP 'METAMOD_VERSION=\K[0-9]+' matchup.sh || echo "1403")
          echo "tfm=$TFM" >> "$GITHUB_OUTPUT"
          echo "css=$CSS" >> "$GITHUB_OUTPUT"
          echo "metamod=$MM" >> "$GITHUB_OUTPUT"
          echo "TFM=$TFM, CSS=$CSS, Metamod=$MM"

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ steps.versions.outputs.tfm == 'net10.0' && '10.0.x' || '8.0.x' }}

      - name: Build plugin
        run: dotnet build MatchUp.csproj -c Release

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: tomppahh
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          build-args: |
            CSSAPI_VERSION=${{ steps.versions.outputs.css }}
            METAMOD_VERSION=${{ steps.versions.outputs.metamod }}
          tags: |
            ghcr.io/tomppahh/pelipaja-cs2:latest
            ghcr.io/tomppahh/pelipaja-cs2:v${{ steps.versions.outputs.css }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
